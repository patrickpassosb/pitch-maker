services:
  - type: web
    name: pitch-maker-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-frontend-url.vercel.app" # You'll update this later
      - key: MISTRAL_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: "JBFqnCBsd6RMkjVDRZzb"
      - key: FAL_KEY
        sync: false
