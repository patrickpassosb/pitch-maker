<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PITCH MAKER - Create Your Script</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#313030",
              "on-tertiary": "#003063",
              "primary-fixed-dim": "#f1bf61",
              "on-surface": "#e5e2e1",
              "tertiary-fixed-dim": "#a9c7ff",
              "primary": "#f2c062",
              "on-secondary": "#3e2e0d",
              "surface-container": "#201f1f",
              "outline": "#9b8f7e",
              "outline-variant": "#4f4537",
              "surface-container-lowest": "#0e0e0e",
              "secondary-fixed-dim": "#dec396",
              "surface-variant": "#353534",
              "on-error": "#690005",
              "surface-tint": "#f1bf61",
              "background": "#131313",
              "on-secondary-fixed": "#271900",
              "surface": "#131313",
              "secondary": "#dec396",
              "tertiary-container": "#89adec",
              "inverse-primary": "#7c5800",
              "on-secondary-fixed-variant": "#564422",
              "on-tertiary-container": "#144078",
              "on-primary-fixed-variant": "#5e4200",
              "tertiary": "#abc8ff",
              "primary-fixed": "#ffdea7",
              "tertiary-fixed": "#d6e3ff",
              "surface-container-low": "#1c1b1b",
              "secondary-fixed": "#fbdfb0",
              "on-tertiary-fixed": "#001b3d",
              "on-primary": "#412d00",
              "surface-container-highest": "#353534",
              "error-container": "#93000a",
              "on-primary-container": "#563c00",
              "surface-dim": "#131313",
              "on-background": "#e5e2e1",
              "error": "#ffb4ab",
              "on-error-container": "#ffdad6",
              "surface-container-high": "#2a2a2a",
              "on-primary-fixed": "#271900",
              "surface-bright": "#3a3939",
              "inverse-surface": "#e5e2e1",
              "on-tertiary-fixed-variant": "#1d477f",
              "secondary-container": "#594624",
              "on-surface-variant": "#d2c5b1"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
      .glass-card {
        background: rgba(28, 27, 27, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .input-glow:focus {
        box-shadow: 0 4px 20px -10px rgba(242, 192, 98, 0.3);
      }
      .bg-noir-radial {
        background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
</head>
<body class="bg-noir-radial min-h-screen text-on-surface font-body selection:bg-primary/30">
<!-- Top Navigation Suppression: Linear Task Flow (New Pitch Entry) -->
<main class="flex flex-col items-center justify-center px-6 py-12 md:py-20 min-h-screen">
<!-- Header Section -->
<div class="mb-10 text-center">
<h1 class="font-headline font-black text-primary text-5xl md:text-6xl tracking-tighter uppercase drop-shadow-[0_0_15px_rgba(242,192,98,0.2)]">
                PITCH MAKER
            </h1>
<p class="font-label text-sm md:text-base tracking-[0.2em] uppercase mt-4 text-on-surface-variant/60 font-medium">
                Turn your project into a cinematic pitch
            </p>
</div>
<!-- Glassmorphic Form Card -->
<section class="glass-card w-full max-w-[640px] p-8 md:p-12 border border-outline-variant/20 rounded-lg shadow-2xl relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
<form class="space-y-8">
<!-- 1. Project Name -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-2 opacity-70 group-focus-within:opacity-100 transition-opacity">
                        Project Name
                    </label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface font-headline italic text-xl px-0 py-3 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-surface-variant" placeholder="The Untitled Narrative" type="text"/>
</div>
<!-- 2. Description -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-2 opacity-70 group-focus-within:opacity-100 transition-opacity">
                        What does it do?
                    </label>
<textarea class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface font-body text-base px-0 py-3 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-surface-variant resize-none" placeholder="Describe the core essence of your story..." rows="3"></textarea>
</div>
<!-- 3. Audience -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-2 opacity-70 group-focus-within:opacity-100 transition-opacity">
                        Who is it for?
                    </label>
<input class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface font-body text-base px-0 py-3 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-surface-variant" placeholder="Global Sci-Fi Enthusiasts, Studio Execs..." type="text"/>
</div>
<!-- 4. Key Features -->
<div class="group">
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-2 opacity-70 group-focus-within:opacity-100 transition-opacity">
                        Key Features
                    </label>
<textarea class="w-full bg-surface-container-lowest border-0 border-b border-outline-variant/30 text-on-surface font-body text-base px-0 py-3 focus:ring-0 focus:border-primary transition-all duration-300 placeholder:text-surface-variant resize-none" placeholder="List the non-negotiables: The hook, the twist, the technology..." rows="4"></textarea>
</div>
<!-- Grid for Toggles -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-10">
<!-- 5. Pitch Duration -->
<div>
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-4 opacity-70">
                            Pitch Duration
                        </label>
<div class="flex items-center gap-1 bg-surface-container-lowest p-1 rounded-md">
<button class="flex-1 py-2 text-xs font-bold tracking-tighter bg-surface-container-highest text-primary border border-primary/20 rounded" type="button">30S</button>
<button class="flex-1 py-2 text-xs font-bold tracking-tighter text-on-surface-variant hover:text-on-surface transition-colors" type="button">60S</button>
<button class="flex-1 py-2 text-xs font-bold tracking-tighter text-on-surface-variant hover:text-on-surface transition-colors" type="button">90S</button>
</div>
</div>
<!-- 6. Visual Style -->
<div>
<label class="block font-label text-[10px] tracking-widest uppercase text-secondary mb-4 opacity-70">
                            Visual Style
                        </label>
<div class="flex items-center justify-between bg-surface-container-lowest px-4 py-2 rounded-md">
<span class="text-[10px] font-bold tracking-widest text-primary">AI IMAGES</span>
<button class="relative inline-flex h-5 w-10 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out bg-surface-container-highest focus:outline-none" role="switch" type="button">
<span class="translate-x-0 pointer-events-none inline-block h-4 w-4 transform rounded-full bg-primary shadow ring-0 transition duration-200 ease-in-out"></span>
</button>
<span class="text-[10px] font-bold tracking-widest text-on-surface-variant opacity-40">VIDEO CLIPS</span>
</div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-sm tracking-[0.15em] uppercase py-5 rounded-md flex items-center justify-center gap-3 group hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_10px_20px_-10px_rgba(242,192,98,0.4)]" type="submit">
                        Generate Cinematic Pitch
                        <span class="material-symbols-outlined text-base group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
</section>
<!-- Footer Meta -->
<footer class="mt-12 text-center">
<p class="font-label text-[9px] tracking-[0.3em] uppercase text-on-surface-variant opacity-30">
                Powered by Pitch Maker AI • Render Engine v4.0
            </p>
</footer>
</main>
<!-- Side Bar suppression check: This is a task-focused "New Pitch" screen, but we provide the SideNav to allow escape to Archive if needed as per branding anchors -->
<nav class="fixed left-0 top-0 h-full hidden md:flex flex-col items-center py-8 z-40 bg-[#131313] w-20 border-r border-outline-variant/10">
<div class="mb-12">
<span class="font-headline font-bold text-primary tracking-tighter text-2xl">PM</span>
</div>
<div class="flex flex-col gap-10 flex-1">
<a class="flex flex-col items-center gap-1 text-primary border-r-2 border-primary pr-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">movie_filter</span>
<span class="font-['Inter'] tracking-[0.1em] text-[8px] uppercase font-medium">New Pitch</span>
</a>
<a class="flex flex-col items-center gap-1 text-[#dec396] opacity-40 hover:opacity-100 transition-all" href="#">
<span class="material-symbols-outlined">folder_special</span>
<span class="font-['Inter'] tracking-[0.1em] text-[8px] uppercase font-medium">Archive</span>
</a>
<a class="flex flex-col items-center gap-1 text-[#dec396] opacity-40 hover:opacity-100 transition-all" href="#">
<span class="material-symbols-outlined">theaters</span>
<span class="font-['Inter'] tracking-[0.1em] text-[8px] uppercase font-medium">Studio</span>
</a>
</div>
<div class="mt-auto">
<span class="material-symbols-outlined text-on-surface-variant/40 hover:text-primary transition-colors cursor-pointer">settings</span>
</div>
</nav>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 w-[50vw] h-[512px] bg-primary/5 blur-[120px] rounded-full pointer-events-none -translate-y-1/2 translate-x-1/4"></div>
<div class="fixed bottom-0 left-0 w-[40vw] h-[409px] bg-primary-container/5 blur-[100px] rounded-full pointer-events-none translate-y-1/4 -translate-x-1/4"></div>
</body></html>
